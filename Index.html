<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Pro</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f5f5;
}

/* Layout */
.container{
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:#fff;
  border-right:1px solid #eee;
  padding:16px;
}

.sidebar h3{
  font-size:14px;
  margin-bottom:10px;
}

.sidebar input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

/* Chat */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:14px;
  background:#1F5EFF;
  color:#fff;
  font-weight:600;
}

.messages{
  flex:1;
  padding:16px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px 14px;
  border-radius:12px;
  max-width:70%;
}

.bot{background:#f1f1f1;}
.user{
  background:#1F5EFF;
  color:#fff;
  align-self:flex-end;
}

.input{
  display:flex;
  border-top:1px solid #eee;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
}

button{
  background:#1F5EFF;
  color:#fff;
  border:none;
  padding:12px 16px;
  cursor:pointer;
}

/* Lead */
.lead{
  padding:14px;
  border-top:1px solid #eee;
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Setup (Simple)</h3>
    <input placeholder="Business name" id="biz">
    <input placeholder="Website URL (optional)" id="site">
    <button onclick="init()">Start</button>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="header" id="title">Aria Assistant</div>

    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="input" placeholder="Ask something..." disabled>
      <button onclick="send()">→</button>
    </div>

    <div class="lead" id="leadBox">
      <input placeholder="Your name" id="name"><br><br>
      <input placeholder="Your email" id="email"><br><br>
      <button onclick="saveLead()">Submit</button>
    </div>

  </div>
</div>

<script>
let started=false;
let count=0;

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function init(){
  const biz=document.getElementById("biz").value || "this business";
  document.getElementById("title").innerText=biz + " Assistant";

  started=true;
  document.getElementById("input").disabled=false;

  add("Hi 👋 I'm your assistant. Looking for pricing or booking?","bot");
}

function send(){
  if(!started) return;

  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  add(text,"user");
  input.value="";
  count++;

  if(text.toLowerCase().includes("price")){
    reply("Our services start from $25.");
  }
  else if(text.toLowerCase().includes("book")){
    reply("I can help you book. Want to leave your details?");
    showLead();
  }
  else{
    reply("Yes, we can help with that.");
  }

  if(count===3){
    showLead();
  }
}

function reply(text){
  add(text,"bot");

  setTimeout(()=>{
    add("Do you want pricing, booking, or to talk to a human?","bot");
  },700);
}

function showLead(){
  document.getElementById("leadBox").style.display="block";
}

function saveLead(){
  const name=document.getElementById("name").value;
  const email=document.getElementById("email").value;

  console.log("Lead:",name,email);

  add("Thanks! We'll contact you soon.","bot");
  document.getElementById("leadBox").style.display="none";
}
</script>

</body>
</html>
